name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Test
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe
          CXX: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\g++.exe
        run: go test -mod=vendor ./...
      - name: Build Windows GUI
        shell: pwsh
        env:
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe
          CXX: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\g++.exe
        run: ./scripts/build-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/itsmyto-windows-amd64.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Test
        run: go test -mod=vendor ./...
      - name: Build Linux
        run: |
          mkdir -p dist
          go build -mod=vendor -trimpath -ldflags="-s -w" -o dist/itsmyto-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/itsmyto-linux-amd64
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: cd dist && sha256sum itsmyto-* > SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag
          --generate-notes
          --title "ItsMyTo $GITHUB_REF_NAME"
