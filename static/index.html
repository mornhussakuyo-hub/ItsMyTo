<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ItsMyTo</title>
    <link rel="stylesheet" href="/static/base.css" />
    <link rel="stylesheet" href="/static/components.css" />
    <link rel="stylesheet" href="/static/forms.css" />
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.7-3.7"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 .9-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.5.9h.1a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></symbol>
      <symbol id="i-edit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></symbol>
      <symbol id="i-archive" viewBox="0 0 24 24"><path d="M21 8H3V4h18Z"/><path d="M5 8v12h14V8"/><path d="M10 12h4"/></symbol>
      <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></symbol>
      <symbol id="i-copy" viewBox="0 0 24 24"><path d="M8 8h11v11H8Z"/><path d="M5 16H4V4h12v1"/></symbol>
      <symbol id="i-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></symbol>
      <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1"/></symbol>
      <symbol id="i-close" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
      <symbol id="i-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></symbol>
    </svg>

    <main class="app">
      <header class="topbar">
        <div>
          <h1>ItsMyTo!</h1>
          <p>本地 API KEY 加密存储</p>
        </div>
        <div class="top-actions">
          <label class="search">
            <svg><use href="#i-search"/></svg>
            <input id="searchInput" autocomplete="off" placeholder="搜索名称、BaseURL、Key 或介绍" />
          </label>
          <button class="primary-button" id="searchButton"><svg><use href="#i-search"/></svg><span>搜索</span></button>
          <button class="icon-button" id="settingsButton" title="设置" aria-label="设置"><svg><use href="#i-settings"/></svg></button>
          <button class="primary-button" id="newButton"><svg><use href="#i-plus"/></svg><span>新增</span></button>
        </div>
      </header>

      <section class="filters" aria-label="列表筛选">
        <button class="tab active" data-filter="active">当前</button>
        <button class="tab" data-filter="archive">含归档</button>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>
      <section id="empty" class="empty" hidden>
        <h2>还没有卡片</h2>
        <p>添加第一个 API Key，之后可以用一个搜索框同时命中关键词、正则和语义相似度。</p>
      </section>
    </main>

    <dialog id="cardDialog" class="dialog">
      <form id="cardForm" method="dialog">
        <div class="dialog-head">
          <h2 id="cardDialogTitle">新增卡片</h2>
          <button class="icon-button" type="button" data-close="cardDialog" aria-label="关闭"><svg><use href="#i-close"/></svg></button>
        </div>
        <div class="form-grid">
          <label>Name<input name="name" required maxlength="120" /></label>
          <label>BaseURL<input name="baseUrl" required maxlength="400" /></label>
          <label class="full">APIKEY<input name="apiKey" autocomplete="off" /></label>
          <label class="full">详细介绍<textarea name="description" rows="4" maxlength="2000"></textarea></label>
          <label class="full">详细文档地址（DOC）<input name="docUrl" maxlength="500" /></label>
        </div>
        <div class="dialog-actions">
          <button type="button" class="ghost-button" data-close="cardDialog">取消</button>
          <button type="submit" class="primary-button"><svg><use href="#i-save"/></svg><span>保存</span></button>
        </div>
      </form>
    </dialog>

    <dialog id="settingsDialog" class="dialog">
      <form id="settingsForm" method="dialog">
        <div class="dialog-head">
          <h2>设置</h2>
          <button class="icon-button" type="button" data-close="settingsDialog" aria-label="关闭"><svg><use href="#i-close"/></svg></button>
        </div>
        <div class="form-grid">
          <label class="full">Embedding API URL<input name="embeddingUrl" placeholder="OpenAI-compatible /embeddings endpoint" /></label>
          <label class="full">Embedding Model Name<input name="embeddingModel" placeholder="text-embedding-3-small" /></label>
          <label class="full">Embedding API Key<input name="embeddingApiKey" type="password" autocomplete="off" /></label>
          <label>批次大小<input name="embeddingBatchSize" type="number" min="1" max="1000" step="1" placeholder="10" /></label>
          <label>单批最大处理 Token 数<input name="embeddingMaxTokens" type="number" min="1" max="1000000" step="1" placeholder="8192" /></label>
          <div class="settings-stack full">
            <label>主题
              <select name="theme">
                <option value="system">跟随系统</option>
                <option value="dark">深色</option>
                <option value="light">浅色</option>
              </select>
            </label>
            <label class="check"><input type="checkbox" name="autostart" /> 开机启动</label>
            <label class="check"><input type="checkbox" name="clearEmbeddingKey" /> 清除已保存的 Embedding API Key</label>
          </div>
        </div>
        <div class="dialog-actions">
          <button type="button" class="ghost-button" data-close="settingsDialog">取消</button>
          <button type="submit" class="primary-button"><svg><use href="#i-save"/></svg><span>保存</span></button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/static/utils.js"></script>
    <script src="/static/api.js"></script>
    <script src="/static/render.js"></script>
    <script src="/static/dialogs.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
